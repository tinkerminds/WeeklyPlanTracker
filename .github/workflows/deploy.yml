name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_BACKEND_APP_NAME: 'wp-tracker-api-ganesh'
  AZURE_FRONTEND_APP_NAME: 'wp-tracker-app-ganesh'
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'

jobs:
  # =============================================
  # Job 1: Build and Deploy Backend
  # =============================================
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: server

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: server

      - name: Run Tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: server

      - name: Publish
        run: dotnet publish src/WeeklyPlanTracker.API/WeeklyPlanTracker.API.csproj --configuration Release --output ${{ github.workspace }}/backend-publish
        working-directory: server

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_BACKEND_APP_NAME }}
          package: ${{ github.workspace }}/backend-publish

  # =============================================
  # Job 2: Build and Deploy Frontend
  # =============================================
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run Tests
        run: npx ng test --no-watch --coverage
        working-directory: client

      - name: Build for production
        run: npx ng build --configuration production
        working-directory: client

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_FRONTEND_APP_NAME }}
          package: ${{ github.workspace }}/client/dist/client/browser
