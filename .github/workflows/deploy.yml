name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_BACKEND_APP_NAME: 'weekly-plan-tracker-api'    # Replace with your Azure App Service name
  AZURE_FRONTEND_APP_NAME: 'weekly-plan-tracker-app'   # Replace with your Azure Static Web App or App Service name
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'

jobs:
  # =============================================
  # Job 1: Build and Deploy Backend
  # =============================================
  deploy-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish src/WeeklyPlanTracker.API/WeeklyPlanTracker.API.csproj --configuration Release --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: server/publish

  # =============================================
  # Job 2: Build and Deploy Frontend
  # =============================================
  deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npx ng test --no-watch --browsers=ChromeHeadless --coverage

      - name: Build for production
        run: npx ng build --configuration production

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: client/dist/client/browser
